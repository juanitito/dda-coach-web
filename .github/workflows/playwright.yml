name: Playwright smoke tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run smoke tests
        run: npm test
        env:
          # Par défaut prod ; à override en BASE_URL pour pointer un preview
          # via repository secrets ou via workflow_dispatch input.
          BASE_URL: ${{ vars.BASE_URL || 'https://dda-coach.vercel.app' }}
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
